# pnpm config for this single-package repo. pnpm 11.3.0 reads settings from
# here, not from the "pnpm" field in package.json.

overrides:
  uuid: '>=11.1.1'
  # No @gaunt-sloth/* redirect needed: alpha.6 declares zod `^4.0.0` itself
  # (GS2-15 fix c), so pnpm no longer dedupes the gaunt-sloth subtree onto this
  # repo's zod 3.
  #
  # PLAT-22 (temporary, mirrors the REL-9 pattern in reverse): published
  # @galvanized-pukeko/vue-ui@0.1.1 predates PLAT-23's applyTheme/resetTheme
  # API (merged on-disk 2026-07-15, not yet republished), so redirect to the
  # sibling PLAT-22 galvanized-pukeko worktree to build against it. DROP this
  # once vue-ui republishes with applyTheme and bump the package.json pin —
  # same cleanup REL-9 did for the alpha.5→alpha.6 file: redirect.
  '@galvanized-pukeko/vue-ui': 'file:../galvanized-pukeko/packages/galvanized-pukeko-vue-ui'

  # GS2-43 (temporary, same PLAT-22 pattern): published @gaunt-sloth/*@alpha.8
  # still has the flat `projectGuidelines` key; the `prompts` object this repo
  # now sets in server/index.ts exists only in the unreleased 2.0 config schema,
  # so redirect to the sibling gaunt-sloth worktree/trunk to build against it.
  # DROP these two once a @gaunt-sloth release with the `prompts` schema is
  # published and bump the package.json pins.
  '@gaunt-sloth/agent': 'file:../gaunt-sloth/packages/agent'
  '@gaunt-sloth/core': 'file:../gaunt-sloth/packages/core'

  # Dependencies pnpm is allowed to run install/build scripts for. esbuild needs
  # its postinstall to fetch its native binary; without this pnpm skips it
  # (ERR_PNPM_IGNORED_BUILDS) and vite/vitest fail to start.
allowBuilds:
  esbuild: true

minimumReleaseAgeExclude:
  - '@gaunt-sloth/agent@2.0.0-alpha.8'
  - '@gaunt-sloth/core@2.0.0-alpha.8'
  - '@galvanized-pukeko/vue-ui@0.1.1'
